name: p1-mini

topology:
  kinds:
    linux:
      image: quay.io/frrouting/frr:10.2.1

  nodes:
    spine1:
      kind: linux
      binds:
        - configs/spine1/daemons:/etc/frr/daemons
        - configs/spine1/frr.conf:/etc/frr/frr.conf

    spine2:
     kind: linux
     binds:
        - configs/spine2/daemons:/etc/frr/daemons
        - configs/spine2/frr.conf:/etc/frr/frr.conf
    leaf1:
      kind: linux
      binds:
        - configs/leaf1/daemons:/etc/frr/daemons
        - configs/leaf1/frr.conf:/etc/frr/frr.conf

    leaf2:
      kind: linux
      binds:
        - configs/leaf2/daemons:/etc/frr/daemons
        - configs/leaf2/frr.conf:/etc/frr/frr.conf

    h1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.11.10/24 dev eth1
        - ip route replace default via 192.168.11.1

    h2:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool
      exec:
        - ip link set eth1 up
        - ip addr add 192.168.12.10/24 dev eth1
        - ip route replace default via 192.168.12.1

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine2:eth1", "leaf1:eth3"]
    - endpoints: ["spine2:eth2", "leaf2:eth3"]
    - endpoints: ["leaf1:eth2", "h1:eth1"]
    - endpoints: ["leaf2:eth2", "h2:eth1"]
